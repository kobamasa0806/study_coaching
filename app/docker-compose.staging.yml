# staging 環境（ローカル検証 + EC2 デプロイ共用）の Docker Compose 設定
# 起動: docker compose -f docker-compose.staging.yml --env-file .env.staging up -d --build
# 停止: docker compose -f docker-compose.staging.yml down
# ログ: docker compose -f docker-compose.staging.yml logs -f backend

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # DB ポートはホストに公開しない（コンテナ間通信のみ）

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.staging
      SECRET_KEY: ${SECRET_KEY}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY}
      DJANGO_ADMIN_URL: ${DJANGO_ADMIN_URL}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      # ローカル検証時は ENABLE_HTTPS=0 にして SSL リダイレクトを無効化する
      ENABLE_HTTPS: ${ENABLE_HTTPS:-0}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      DB_SSLMODE: disable  # コンテナ間通信のため disable
      AWS_COGNITO_REGION: ${AWS_COGNITO_REGION}
      AWS_COGNITO_USER_POOL_ID: ${AWS_COGNITO_USER_POOL_ID}
      AWS_COGNITO_APP_CLIENT_ID: ${AWS_COGNITO_APP_CLIENT_ID}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/var/www/static:ro
      - media_files:/var/www/media:ro

volumes:
  db_data:
  static_files:
  media_files:
