# staging 用 nginx リバプロ設定
# ローカル検証時: HTTP のみ。EC2 デプロイ時は certbot --nginx で TLS 設定を追加する

upstream django {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # 静的ファイル
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        access_log off;
    }

    # メディアファイル
    location /media/ {
        alias /var/www/media/;
        expires 7d;
    }

    # ヘルスチェックは nginx 自身で 200 を返してもよいが、
    # backend まで届くことを確認したいので Django に流す
    location = /healthz/ {
        proxy_pass http://django;
        access_log off;
    }

    # その他は Django へリバプロ
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
